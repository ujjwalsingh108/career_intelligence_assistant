services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: career_intelligence
      POSTGRES_USER: career
      POSTGRES_PASSWORD: career
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://career:career@postgres:5432/career_intelligence
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_ANALYSIS_MODEL: ${GROQ_ANALYSIS_MODEL:-llama-3.3-70b-versatile}
      GROQ_CHAT_MODEL: ${GROQ_CHAT_MODEL:-llama-3.1-8b-instant}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-384}
    depends_on:
      - postgres
    ports:
      - "8000:8000"

volumes:
  postgres_data:
